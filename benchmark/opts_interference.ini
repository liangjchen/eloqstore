# EloqStore options for interference_bench (docs/design/io_qos.md commit 3).
#
# Append mode with small (8MB) data files so the rotating partial-overwrite
# storm pushes per-file space amplification past file_amplify_factor quickly,
# keeping compaction's move pipeline (background ReadPages bursts) busy.
#
# Sweep the QoS knobs below (see io_qos_impl_plan.md "Performance
# acceptance"): max_inflight_read in {64,128,256,512}, bg_read_ratio in
# {10,25,50}, max_inflight_write in {256,512,1024}.

# Note: run interference_bench with --partitions >= num_threads, or some
# shards sit idle and their RESULT qos lines read zero.

[run]
num_threads = 4
buffer_pool_size = 400MB
fd_limit = 5000
num_retained_archives = 0
skip_verify_checksum = true

# --- IO QoS knobs under test ---
max_inflight_read = 64
bg_read_ratio = 25
max_inflight_write = 512

[permanent]
store_path = /tmp/eloqstore_interference
data_page_size = 4KB
data_file_size = 8MB
data_append_mode = true
