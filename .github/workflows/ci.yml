name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    name: test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    env:
      CCACHE_DIR: /home/runner/.cache/ccache
      CCACHE_MAXSIZE: 1G

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/scripts/install_dependency_ubuntu2404.sh"

      # ── C++ core engine ──────────────────────────────────────────

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSKIP_CREATE_BUCKET=ON

      - name: Build C++ engine
        run: cmake --build build -j$(nproc)

      - name: Install and start MinIO
        run: |
          case "$(uname -m)" in
            x86_64) MINIO_ARCH=amd64 ;;
            aarch64|arm64) MINIO_ARCH=arm64 ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          wget -q "https://dl.min.io/server/minio/release/linux-${MINIO_ARCH}/minio"
          chmod +x minio
          mkdir -p /tmp/minio-data
          ./minio server /tmp/minio-data --address :9900 --console-address ":9001" &
          MINIO_PID=$!
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:9900/minio/health/ready >/dev/null; then
              break
            fi
            sleep 1
          done
          echo "MINIO_PID=$MINIO_PID" >> "$GITHUB_ENV"

      - name: Run C++ unit tests
        run: |
          sudo prlimit --pid $$ --memlock=unlimited:unlimited || true
          ctest --test-dir build/tests/ --output-on-failure

      # ── Python SDK ────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-ci-pip-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-ci-pip-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: ${{ runner.os }}-${{ matrix.arch }}-ci-ccache-${{ hashFiles('CMakeLists.txt', 'ffi/**', 'include/**', 'src/**', 'rust/eloqstore-sys/**', 'python/build_hooks.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-ci-ccache-

      - name: Reset ccache stats
        run: ccache --zero-stats || true

      - name: Build Python wheel
        run: |
          python3 -m pip install build pytest wheel
          python3 -m build --wheel
        working-directory: ${{ github.workspace }}/python

      - name: Run Python tests
        run: |
          ELOQSTORE_PY_LIB="$GITHUB_WORKSPACE/python/build/native/libeloqstore_capi.so" \
          PYTHONPATH="$GITHUB_WORKSPACE/python/src" \
          python3 -m pytest \
            "$GITHUB_WORKSPACE/python/tests/test_import.py" \
            "$GITHUB_WORKSPACE/python/tests/test_client_integration.py"

      - name: Verify Python wheel install
        run: |
          python3 -m pip install --no-deps --target /tmp/eloqstore-wheel-test python/dist/*.whl
          PYTHONPATH=/tmp/eloqstore-wheel-test python3 - <<'PY'
          from eloqstore import Client, Options
          client = Client(Options(table_name="demo", partition_id=0, num_threads=1))
          client.put("k", b"v")
          assert client.get("k") == b"v"
          client.close()
          PY

      # ── Rust SDK ──────────────────────────────────────────────────

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target

      - name: Build Rust SDK static example
        run: |
          cd rust
          ELOQSTORE_STATIC_EXE=1 cargo build --release --example basic_usage
          ./target/release/examples/basic_usage

      - name: Run Rust integration tests
        run: cargo test -p eloqstore --test integration_test -- --nocapture --test-threads=1
        working-directory: ${{ github.workspace }}/rust

      # ── cleanup ───────────────────────────────────────────────────

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
