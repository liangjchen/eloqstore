name: SDK Checks

on:
  pull_request:
    paths:
      - "python/**"
      - "rust/**"
      - "ffi/**"
      - "CMakeLists.txt"
      - "VERSION"
      - ".github/workflows/sdk-checks.yml"
  push:
    branches:
      - main
    paths:
      - "python/**"
      - "rust/**"
      - "ffi/**"
      - "CMakeLists.txt"
      - "VERSION"
      - ".github/workflows/sdk-checks.yml"
  workflow_dispatch:

jobs:
  sdk-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CCACHE_DIR: /github/home/.cache/ccache
      CCACHE_MAXSIZE: 1G
    container:
      image: eloqdata/eloq-dev-ci-ubuntu2404:latest
      options: --user root --security-opt seccomp=unconfined

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix permissions
        run: chmod -R a+rwx "$GITHUB_WORKSPACE" || true

      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check version consistency
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION = $VER"

          PY_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' python/pyproject.toml | head -n1)
          echo "pyproject.toml version = $PY_VER"
          if [ "$VER" != "$PY_VER" ]; then
            echo "ERROR: VERSION ($VER) != pyproject.toml ($PY_VER)" >&2
            exit 1
          fi

          SYS_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' rust/eloqstore-sys/Cargo.toml | head -n1)
          echo "eloqstore-sys/Cargo.toml version = $SYS_VER"
          if [ "$VER" != "$SYS_VER" ]; then
            echo "ERROR: VERSION ($VER) != eloqstore-sys/Cargo.toml ($SYS_VER)" >&2
            exit 1
          fi

          SDK_VER=$(sed -n 's/^version = "\(.*\)"/\1/p' rust/eloqstore/Cargo.toml | head -n1)
          echo "eloqstore/Cargo.toml version = $SDK_VER"
          if [ "$VER" != "$SDK_VER" ]; then
            echo "ERROR: VERSION ($VER) != eloqstore/Cargo.toml ($SDK_VER)" >&2
            exit 1
          fi

          echo "All version files consistent: $VER"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          key: ${{ runner.os }}-sdk-checks-pip-v1-${{ hashFiles('python/pyproject.toml', '.github/workflows/sdk-checks.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdk-checks-pip-v1-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ${{ runner.os }}-sdk-checks-ccache-v1-${{ hashFiles('CMakeLists.txt', 'ffi/**', 'include/**', 'src/**', 'rust/eloqstore-sys/**', 'python/build_hooks.py', '.github/workflows/sdk-checks.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdk-checks-ccache-v1-

      - name: Reset ccache stats
        run: ccache --zero-stats || true

      - name: Build Python wheel
        run: |
          python3 -m pip install build pytest
          python3 -m build --wheel
        working-directory: ${{ github.workspace }}/python

      - name: Run Python tests
        run: |
          ELOQSTORE_PY_LIB="$GITHUB_WORKSPACE/python/build/native/libeloqstore_capi.so" \
          PYTHONPATH="$GITHUB_WORKSPACE/python/src" \
          python3 -m pytest \
            "$GITHUB_WORKSPACE/python/tests/test_import.py" \
            "$GITHUB_WORKSPACE/python/tests/test_client_integration.py"
        working-directory: ${{ github.workspace }}

      - name: Verify Python wheel install
        run: |
          python3 -m pip install --no-deps --target /tmp/eloqstore-wheel-test python/dist/*.whl
          PYTHONPATH=/tmp/eloqstore-wheel-test python3 - <<'PY'
          from eloqstore import Client, Options
          client = Client(Options(table_name="demo", partition_id=0, num_threads=1))
          client.put("k", b"v")
          assert client.get("k") == b"v"
          client.close()
          PY
        working-directory: ${{ github.workspace }}

      - name: Run Rust integration tests
        run: cargo test -p eloqstore --test integration_test -- --nocapture --test-threads=1
        working-directory: ${{ github.workspace }}/rust

      - name: Check Rust FFI package
        run: cargo package -p eloqstore-sys --allow-dirty --no-verify
        working-directory: ${{ github.workspace }}/rust

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
